{{define "trace-layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beru Trace Diff</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-semibold tracking-tight"><a href="/dashboard">Beru Dashboard</a></h1>
      <span class="text-sm text-slate-500">Trace diff</span>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-6 py-6">
    {{template "trace-content" .}}
  </main>
  <script src="/dashboard/static/app.js"></script>
</body>
</html>
{{end}}
