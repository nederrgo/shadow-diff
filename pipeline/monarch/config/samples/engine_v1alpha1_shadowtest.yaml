apiVersion: engine.shadow-diff.io/v1alpha1
kind: ShadowTest
metadata:
  labels:
    app.kubernetes.io/name: monarch
    app.kubernetes.io/managed-by: kustomize
  name: shadowtest-sample
  namespace: default
spec:
  targetDeployment: my-prod-app
  targetNamespace: default
  oldImage: ghcr.io/org/app:v1
  newImage: ghcr.io/org/app:v2
  servicePort: 8080
  applicationPort: 8081
  beruGRPCAddress: beru.beru-system.svc.cluster.local:50051
  # Optional: Igris listener ports (default: servicePort → http)
  # inputs:
  #   - port: 8080
  #     addon: http
  # igris:
  #   image: igris-http:latest   # optional; Monarch resolves igris-http:{tag} from MONARCH_MODE
  # Ephemeral dependencies: one isolated instance per shadow role (control-a, control-b, candidate).
  # Monarch injects envVarInjection as host:port, e.g. redis-control-a.<shadow-ns>.svc.cluster.local:6379
  # dependencies:
  #   - name: redis
  #     image: redis:7-alpine
  #     port: 6379
  #     envVarInjection: REDIS_ADDR
