              inputs:
                description: |-
                  Inputs defines Igris listener ports and drivers. When empty, Monarch defaults to
                  a single HTTP listener on servicePort.
                items:
                  description: 'InputSpec declares an ingress driver: HTTP/TCP listeners
                    or RabbitMQ message capture.'
                  properties:
                    addon:
                      description: Addon is deprecated; use driver. Legacy value "http"
                        maps to http_request.
                      type: string
                    amqp:
                      description: AMQP holds broker settings when driver is rabbitmq_message.
                      properties:
                        exchange:
                          description: Exchange is the production exchange to bind
                            the shadow queue to.
                          type: string
                        exchangeType:
                          description: ExchangeType is the AMQP exchange type (topic,
                            direct, fanout, headers). Defaults to topic.
                          enum:
                          - topic
                          - direct
                          - fanout
                          - headers
                          type: string
                        prodUrl:
                          description: ProdURL is the production broker URL (e.g.
                            amqp://prod-rabbitmq.default.svc:5672).
                          type: string
                        routingKey:
                          description: RoutingKey is the binding routing key (e.g.
                            "#" or "orders.*").
                          type: string
                        targetDependency:
                          description: TargetDependency is the name of a spec.dependencies
                            entry (shadow brokers per role).
                          type: string
                      required:
                      - exchange
                      - prodUrl
                      - routingKey
                      - targetDependency
                      type: object
                    driver:
                      description: |-
                        Driver selects the ingress path (http_request, tcp_stream, or rabbitmq_message).
                        When empty on a port-based input, Monarch infers from the port.
                      enum:
                      - http_request
                      - tcp_stream
                      - rabbitmq_message
                      type: string
                    port:
                      description: Port is the TCP port Igris binds for HTTP/TCP inputs.
                        Omit for rabbitmq_message.
