          status:
            description: status defines the observed state of ShadowTest
            properties:
              amqpQueueName:
                description: AmqpQueueName is the production broker queue Monarch
                  declared (shadow-diff-<uid>).
                type: string
              captureTargets:
                description: CaptureTargets lists discovered prod pod template labels
                  (key=value, sorted).
                items:
                  type: string
                type: array
              igrisEndpoint:
                description: IgrisEndpoint is the DNS host:port Monarch configured
                  for capture forwarding.
                type: string
              igrisRabbitMQPhase:
                description: IgrisRabbitMQPhase summarizes igris-rabbitmq deployment
                  readiness.
                type: string
              message:
                description: Message carries human-readable detail, including MVP
                  limitations (skipped envFrom, etc.).
                type: string
              phase:
                description: Phase is a high-level summary of reconciliation (e.g.
                  Ready, Progressing, Failed).
                type: string
              shadowNamespace:
                description: ShadowNamespace is the dedicated namespace where control/candidate
                  Deployments run.
                type: string
              siphonPhase:
                description: SiphonPhase summarizes Pixie stream rule reconciliation
                  (Ready, Degraded, Disabled).
                type: string
