              oldImage:
                description: OldImage is the container image for Control-A and Control-B
                  pods.
                type: string
              otelInjection:
                description: OtelInjection enables OpenTelemetry Operator SDK/agent
                  injection on shadow app pods (default on).
                properties:
                  enabled:
                    description: Enabled defaults to true when nil. Set false to skip
                      OTel injection annotations and env.
                    type: boolean
                  language:
                    description: Language overrides image-based detection (java, python,
                      nodejs, dotnet, go).
                    enum:
                    - java
                    - python
                    - nodejs
                    - dotnet
                    - go
                    type: string
                type: object
              recordAndReplay:
                description: RecordAndReplay lists outbound hosts trapped by the egress
                  proxy for strict replay.
                items:
                  description: RecordAndReplayHostSpec declares an outbound host for
                    egress record/replay.
                  properties:
                    host:
                      description: Host is the record-and-replay hostname (matches
                        :authority / Host on proxied requests).
                      type: string
                    ignoreRequestPaths:
                      description: IgnoreRequestPaths are JSONPath expressions stripped
                        before egress hashing (e.g. "$.timestamp").
                      items:
                        type: string
                      type: array
                  required:
                  - host
                  type: object
                type: array
              recorder:
                description: Recorder overrides the Recorder image when spec.recordAndReplay
                  enables egress recording.
                properties:
                  image:
                    description: Image overrides the default Recorder container image.
                    type: string
                type: object
              servicePort:
                description: |-
                  ServicePort is the TCP port the Envoy ingress listener binds on in shadow pods.
                  Defaults to 8888 when unset.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              siphon:
                description: Siphon configures kernel-level traffic capture to Igris.
                properties:
                  enabled:
                    description: Enabled disables Pixie stream rules when explicitly
                      false.
                    type: boolean
                  excludePaths:
                    description: ExcludePaths are regex strings to drop healthchecks/traffic
                      at the kernel layer.
                    items:
                      type: string
                    type: array
                  maxPayloadSize:
                    description: MaxPayloadSize is the max bytes to parse per HTTP/2
                      frame (default 65536).
                    format: int64
                    type: integer
                type: object
              targetDeployment:
                description: |-
                  TargetDeployment is the name of the production Deployment whose pod template
                  (inline env vars from the first container) is mirrored for shadow pods.
                type: string
              targetNamespace:
                description: TargetNamespace is the namespace containing TargetDeployment.
                type: string
            required:
            - newImage
            - oldImage
            - targetDeployment
            - targetNamespace
