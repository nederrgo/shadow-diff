# Namespace + ServiceAccount for Siphon. The DaemonSet is managed by Monarch
# from ShadowTest spec.siphon (see monarch/internal/controller/shadowtest_siphon.go).
apiVersion: v1
kind: Namespace
metadata:
  name: siphon-system
  labels:
    app.kubernetes.io/name: siphon
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: siphon-agent
  namespace: siphon-system
