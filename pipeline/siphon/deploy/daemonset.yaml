apiVersion: v1
kind: Namespace
metadata:
  name: siphon-system
  labels:
    app.kubernetes.io/name: siphon
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: siphon-agent
  namespace: siphon-system
---
# Optional manual bootstrap (Monarch normally owns the DaemonSet via ShadowTest spec.siphon).
# For Kind E2E use: kubectl apply -f siphon/deploy/rbac.yaml  (see scripts/e2e-reset-kind.sh)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: siphon-agent
  namespace: siphon-system
  labels:
    app.kubernetes.io/name: siphon-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: siphon-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: siphon-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: siphon-agent
      containers:
        - name: agent
          image: siphon:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
                - NET_ADMIN
          env:
            - name: SIPHON_PCAP_ADDR
              value: "127.0.0.1:9990"
            - name: SIPHON_API_ADDR
              value: ":8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        - name: netobserv-ebpf-agent
          image: quay.io/netobserv/netobserv-ebpf-agent:main
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: ENABLE_PCA
              value: "true"
            - name: CACHE_ACTIVE_TIMEOUT
              value: "5s"
            - name: CACHE_MAX_FLOWS
              value: "50000"
            - name: DEDUPER
              value: "firstCome"
            - name: EXCLUDE_INTERFACES
              value: ""
            - name: TC_ATTACH_MODE
              value: "tcx"
            - name: TC_ATTACH_RETRIES
              value: "10"
            - name: TARGET_HOST
              value: "127.0.0.1"
            - name: TARGET_PORT
              value: "9990"
            - name: FLOW_FILTER_RULES
              value: '[{"ip_cidr":"0.0.0.0/0","protocol":"TCP","action":"Accept"}]'
          volumeMounts:
            - name: netns
              mountPath: /var/run/netns
              readOnly: true
      volumes:
        - name: netns
          hostPath:
            path: /var/run/netns
            type: Directory
      tolerations:
        - operator: Exists
