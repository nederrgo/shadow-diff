# Master hybrid ShadowTest: RabbitMQ ingress + Mongo OTLP + HTTP record/replay + RMQ Firehose egress (Node.js).
apiVersion: engine.shadow-diff.io/v1alpha1
kind: ShadowTest
metadata:
  name: nodejs-hybrid-shadow
  namespace: default
spec:
  targetDeployment: nodejs-prod-worker

  oldImage: nodejs-hybrid-worker:dev
  newImage: nodejs-hybrid-worker:dev

  inputs:
    - driver: rabbitmq_message
      amqp:
        prodUrl: amqp://guest:guest@rmq-prod-broker.default.svc.cluster.local:5672/
        exchange: orders
        routingKey: order.created
        targetDependency: rabbitmq

  recordAndReplay:
    - host: user-service.prod.internal:8080

  language: nodejs

  dependencies:
    - name: rabbitmq
      type: rabbitmq
      envVarInjection: AMQP_URL
    - name: mongodb
      type: mongodb
      image: mongo:4.4
      envVarInjection: MONGO_URL
