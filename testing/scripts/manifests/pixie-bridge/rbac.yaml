apiVersion: v1
kind: ServiceAccount
metadata:
  name: pixie-stream-bridge
  namespace: monarch-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pixie-stream-bridge
rules:
  - apiGroups: ["engine.shadow-diff.io"]
    resources: ["pixiestreamrules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["engine.shadow-diff.io"]
    resources: ["pixiestreamrules/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pixie-stream-bridge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pixie-stream-bridge
subjects:
  - kind: ServiceAccount
    name: pixie-stream-bridge
    namespace: monarch-system
