# Prod mirror for ShadowTest — holds egress env; real app runs in shadow pods with AMQP_URL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-rmq-nodejs-prod
  namespace: default
  labels:
    app: http-rmq-nodejs-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-rmq-nodejs-prod
  template:
    metadata:
      labels:
        app: http-rmq-nodejs-prod
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: RMQ_EGRESS_EXCHANGE
              value: egress-events
            - name: RMQ_EGRESS_ROUTING_KEY
              value: order.egress
