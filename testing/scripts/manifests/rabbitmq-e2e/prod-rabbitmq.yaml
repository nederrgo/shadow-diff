apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmq-prod-broker
  namespace: default
  labels:
    app: rmq-prod-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rmq-prod-broker
  template:
    metadata:
      labels:
        app: rmq-prod-broker
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rmq-prod-broker
  namespace: default
  labels:
    app: rmq-prod-broker
spec:
  selector:
    app: rmq-prod-broker
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
