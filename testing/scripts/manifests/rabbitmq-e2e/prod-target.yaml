# Stub production Deployment (ShadowTest targetDeployment); no AMQP consumer on prod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmq-prod-target
  namespace: default
  labels:
    app: rmq-prod-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rmq-prod-target
  template:
    metadata:
      labels:
        app: rmq-prod-target
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          env:
            - name: HTTP_PORT
              value: "8080"
