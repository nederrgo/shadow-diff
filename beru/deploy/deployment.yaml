apiVersion: v1
kind: Namespace
metadata:
  name: beru-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beru
  namespace: beru-system
  labels:
    app.kubernetes.io/name: beru
    app.kubernetes.io/component: differ
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beru
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beru
    spec:
      containers:
        - name: beru
          image: beru:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: BERU_GRPC_ADDR
              value: ":50051"
---
apiVersion: v1
kind: Service
metadata:
  name: beru
  namespace: beru-system
  labels:
    app.kubernetes.io/name: beru
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: beru
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
