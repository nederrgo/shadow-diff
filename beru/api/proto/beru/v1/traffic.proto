syntax = "proto3";

package beru.v1;

option go_package = "github.com/shadow-diff/beru/pkg/api/beru/v1;beruv1";

service TrafficReporter {
  rpc ReportTraffic(ReportTrafficRequest) returns (ReportTrafficResponse);
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  INGRESS = 1;
  EGRESS = 2;
}

message Payload {
  map<string, string> metadata = 1;
  bytes body = 2;
  string content_type = 3;
}

message TrafficReport {
  string trace_id = 1;
  string role = 2;
  Direction direction = 3;
  Payload payload = 4;
}

message ReportTrafficRequest {
  TrafficReport report = 1;
}

message ReportTrafficResponse {}
