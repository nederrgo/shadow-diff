# ShadowTest with ephemeral MongoDB per role (Phase 5c mongo egress E2E).
apiVersion: engine.shadow-diff.io/v1alpha1
kind: ShadowTest
metadata:
  name: mongo-test-shadow
  namespace: default
spec:
  targetDeployment: mongo-test-prod
  targetNamespace: default

  oldImage: mongo-test-app:dev
  newImage: mongo-test-app:dev

  servicePort: 8888
  applicationPort: 8080

  beruGRPCAddress: beru.beru-system.svc.cluster.local:50051

  inputs:
    - port: 8888
      driver: http_request

  igris:
    image: igris:dev
    replicas: 1

  siphon:
    enabled: false

  dependencies:
    - name: mongo
      image: mongo:4.4
      port: 27017
      envVarInjection: MONGO_URL
