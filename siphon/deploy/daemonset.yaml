apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: siphon-agent
  namespace: siphon-system
  labels:
    app.kubernetes.io/name: siphon-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: siphon-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: siphon-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: siphon-agent
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: siphon:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: SIPHON_INTERFACE
              value: any
            - name: SIPHON_API_ADDR
              value: ":8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
