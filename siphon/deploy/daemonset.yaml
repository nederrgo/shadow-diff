apiVersion: v1
kind: Namespace
metadata:
  name: siphon-system
  labels:
    app.kubernetes.io/name: siphon
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: siphon-agent
  namespace: siphon-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: siphon-agent
  namespace: siphon-system
  labels:
    app.kubernetes.io/name: siphon-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: siphon-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: siphon-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: siphon-agent
      containers:
        - name: agent
          image: siphon:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
                - NET_ADMIN
          env:
            - name: SIPHON_INTERFACE
              value: "any"
            - name: SIPHON_API_ADDR
              value: ":8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      tolerations:
        - operator: Exists
