# ShadowTest tuned for Kind E2E: prod (port 80) -> Siphon -> Igris:80 -> Envoy:8888 -> echo:8080 -> Beru
#
# Apply:
#   kubectl apply -f examples/e2e-shadowtest.yaml
#   kubectl apply -f examples/e2e-prod-app.yaml   # optional: align prod with echo on :80
#
apiVersion: engine.shadow-diff.io/v1alpha1
kind: ShadowTest
metadata:
  name: my-app-shadow
  namespace: default
spec:
  targetDeployment: my-prod-app
  targetNamespace: default

  # Shadow pods (control-a, control-b, candidate)
  oldImage: mendhak/http-https-echo:latest
  newImage: mendhak/http-https-echo:latest

  # Envoy ingress on shadow pods; Igris multicasts to control-* at this port
  servicePort: 8888
  # Must match the app listen port after Monarch copies prod env (HTTP_PORT=80 on echo)
  applicationPort: 80

  beruGRPCAddress: beru.beru-system.svc.cluster.local:50051

  # Igris listen ports:
  #   80  — Siphon replays captured prod traffic (prod pod dst port 80)
  #   8888 — optional manual tests: curl igris:8888/get
  inputs:
    - port: 80
      driver: http_request
    - port: 8888
      driver: http_request

  igris:
    # Image patched by ./scripts/e2e-reset-kind.sh from $IGRIS_IMG.
    image: igris:dev
    replicas: 1

  siphon:
    enabled: true
    # Image patched by ./scripts/e2e-reset-kind.sh from $SIPHON_IMG (Monarch owns the DaemonSet).
    image: siphon:dev
    sampleRate: 100

  # Egress recorder (Sprint 4a.2): Monarch pushes downstreams + beru_http_host to Siphon /v1/config.
  # Egress replay (Sprint 4a.1): trap outbound HTTP via HTTP_PROXY -> Envoy :15001 -> Beru
  downstreams:
    - host: httpbin.org
      ignoreRequestPaths: []
